name: Close stale PRs and issues
on:
  push:
    branches:
      - 'claude/**'

jobs:
  close-items:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Close PRs and Issues
        uses: actions/github-script@v7
        with:
          script: |
            const comment = "Closing: all changes have been incorporated into main.";
            
            // Close PRs
            for (const pr_number of [40, 41, 42, 43, 44, 45]) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr_number,
                  body: comment
                });
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr_number,
                  state: 'closed'
                });
                console.log(`Closed PR #${pr_number}`);
              } catch (e) {
                console.log(`Failed to close PR #${pr_number}: ${e.message}`);
              }
            }
            
            // Close Issues
            for (const issue_number of [35, 36, 37, 38, 39]) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue_number,
                  body: comment
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue_number,
                  state: 'closed'
                });
                console.log(`Closed issue #${issue_number}`);
              } catch (e) {
                console.log(`Failed to close issue #${issue_number}: ${e.message}`);
              }
            }
